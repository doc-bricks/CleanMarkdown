<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="100%" role="img" aria-label="CleanMarkdown Banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2424"/>
      <stop offset="100%" style="stop-color:#0d3535"/>
    </linearGradient>
    <linearGradient id="broom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="340" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="1200" y2="170" stroke="#1a4040" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="0" x2="600" y2="340" stroke="#1a4040" stroke-width="1" opacity="0.2"/>

  <!-- Left: Broom icon area -->
  <!-- Broom handle -->
  <line x1="200" y1="100" x2="320" y2="240" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round"/>
  <!-- Broom head bristles -->
  <rect x="290" y="225" width="80" height="50" rx="6" fill="url(#broom)" opacity="0.9"/>
  <line x1="295" y1="225" x2="280" y2="275" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <line x1="310" y1="223" x2="298" y2="278" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <line x1="325" y1="222" x2="316" y2="278" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <line x1="340" y1="223" x2="334" y2="278" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <line x1="355" y1="225" x2="352" y2="278" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>
  <line x1="370" y1="228" x2="370" y2="276" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round"/>

  <!-- Scattered Markdown chars being swept away -->
  <text x="100" y="145" font-family="monospace" font-size="32" fill="#4ade80" opacity="0.7" transform="rotate(-15 100 145)">#</text>
  <text x="150" y="200" font-family="monospace" font-size="28" fill="#f472b6" opacity="0.6" transform="rotate(10 150 200)">**</text>
  <text x="88" y="240" font-family="monospace" font-size="24" fill="#fb923c" opacity="0.6" transform="rotate(-8 88 240)">[]</text>
  <text x="168" y="115" font-family="monospace" font-size="20" fill="#a78bfa" opacity="0.5" transform="rotate(20 168 115)">##</text>
  <text x="120" y="175" font-family="monospace" font-size="18" fill="#67e8f9" opacity="0.5" transform="rotate(-5 120 175)">~~</text>

  <!-- Clean text result (right of broom) -->
  <text x="400" y="185" font-family="Georgia, serif" font-size="20" fill="#d1fae5" opacity="0.6">Clean text...</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="265" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>

  <!-- Right: Wordmark + Tagline -->
  <text x="480" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">CleanMarkdown</text>
  <text x="482" y="205" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="#2dd4bf" letter-spacing="1">Clean Markdown. Clear Mind.</text>
  <text x="484" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">Markdown Viewer &amp; Editor · Python · Flutter</text>
</svg>
